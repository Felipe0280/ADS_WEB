<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>calculadora</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: rgba(0, 0, 0, 1);
    }

    .calculadora {
      background-color: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    #tela {
      background-color: #333;
      color: #fff;
      font-size: 50px;
      text-align: right;
      padding: 20px;
    }

    .botoes {
      display: grid;
      grid-template-columns: 70px 70px 70px 70px 70px;
    }

    button {
      padding: 20px;
      font-size: 20px;
      border: 1px solid #818181;
      cursor: pointer;
      background-color: #f9f9f9;
    }

    button.operador {
      background-color: #96b2d3;
    }

    button#igual {
      background-color: blue;
      color: white;
      grid-row: 2/5;
      grid-column: 4/6;
    }

    button#ac {
      background-color: #fd362f;
      color: white;
      grid-column: 4/6;
    }
  </style>
</head>
<body>
  <div class="calculadora">
    <div id="tela">0</div>
    <div class="botoes">
      <button class="operador" onclick="add('+')">+</button>
      <button class="operador" onclick="add('-')">-</button>
      <button class="operador" onclick="add('x')">×</button>
      <button class="operador" onclick="add('÷')">÷</button>
      <button class="operador" onclick="add('^')">^</button>

      <button onclick="add('7')">7</button>
      <button onclick="add('8')">8</button>
      <button onclick="add('9')">9</button>
      <button id="igual" onclick="calc()">=</button>

      <button onclick="add('4')">4</button>
      <button onclick="add('5')">5</button>
      <button onclick="add('6')">6</button>

      <button onclick="add('1')">1</button>
      <button onclick="add('2')">2</button>
      <button onclick="add('3')">3</button>

      <button onclick="add('0')">0</button>
      <button onclick="add(',')">,</button>
      <button></button>
      <button id="ac" onclick="limpar()">AC</button>
    </div>
  </div>

  <script>
    let expressao = '0';
    function add(valor) {
        if(expressao === '0' || expressao === '0,'){
          if(expressao === '0,' && valor != ',' || expressao != '0,' && valor === ','){
            expressao += valor;
            updTela();
          }else{
            expressao = valor;
            updTela();
          }
        }else{
          expressao += valor;
          updTela();
        }
        
    }

    function limpar() {
      expressao = '0';
      updTela('0');
    }

    function calc() {
      try {
        let exCerto = expressao.replaceAll("x", "*").replaceAll("÷", "/").replaceAll("^", "**").replaceAll(",", ".");
        let resultado = eval(exCerto);
        expressao = resultado.toString().replaceAll(".", ",");
        updTela();
      } catch (e) {
        updTela('Error');
        expressao = '0';
      }
    }

    function updTela(valor) {
      document.getElementById('tela').innerHTML = valor || expressao;
    }
  </script>
</body>
</html>
