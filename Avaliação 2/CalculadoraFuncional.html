<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>calculadora</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: rgba(0, 0, 0, 1);
    }

    .calculadora {
      background-color: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .tela {
      background-color: #333;
      color: #fff;
      font-size: 50px;
      text-align: right;
      padding: 20px;
    }

    .botoes {
      display: grid;
      grid-template-columns: repeat(4, 70px);
    }

    button {
      padding: 20px;
      font-size: 20px;
      border: 1px solid #818181;
      cursor: pointer;
      background-color: #f9f9f9;
    }

    button.operador {
      background-color: #eee;
    }

    button.igual {
      background-color: blue;
      color: white;
      grid-row: span 3;
    }

    button.ac {
      background-color: #fd362f;
      color: white;
    }
  </style>
</head>
<body>
  <div class="calculadora">
    <div class="tela" id="tela">0</div>
    <div class="botoes">
      <button class="operador" onclick="add('+')">+</button>
      <button class="operador" onclick="add('-')">-</button>
      <button class="operador" onclick="add('x')">×</button>
      <button class="operador" onclick="add('÷')">÷</button>

      <button onclick="add('7')">7</button>
      <button onclick="add('8')">8</button>
      <button onclick="add('9')">9</button>
      <button class="igual" onclick="calcular()">=</button>

      <button onclick="add('4')">4</button>
      <button onclick="add('5')">5</button>
      <button onclick="add('6')">6</button>

      <button onclick="add('1')">1</button>
      <button onclick="add('2')">2</button>
      <button onclick="add('3')">3</button>

      <button onclick="add('0')">0</button>
      <button onclick="add('.')">.</button>
      <button class="operador" onclick="add('^')">^</button>
      <button class="ac" onclick="limpar()">AC</button>
    </div>
  </div>

  <script>
    let expressao = '';
    function add(valor) {
        expressao += valor;
        atualizarTela();
    }

    function limpar() {
      expressao = '';
      atualizarTela('0');
    }

    function calcular() {
      try {
        let exCerto = expressao.replaceAll("x", "*").replaceAll("÷", "/").replaceAll("^", "**");
        let resultado = eval(exCerto);
        expressao = resultado.toString();
        atualizarTela();
      } catch (e) {
        atualizarTela('Error');
        expressao = '';
      }
    }

    function atualizarTela(valor) {
      document.getElementById('tela').innerHTML = valor || expressao;
    }
  </script>
</body>
</html>
