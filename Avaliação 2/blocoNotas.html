<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloco de Notas</title>
    <style>
        body{
            display: grid;
            height: 100svh;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 1fr;
        }
        #telaNota{
            grid-column: 1/2;
            background-color: rgb(255,238,140);; 
        }
        #telaNota>*{
            position: relative;
            left: 10px;
        }
        #lista{
            display: flex;
            flex-direction: column;
            grid-column: 2/3;
        }
        #tLS{
            align-self: center;
        }
        .botao{
            width: 110px; 
            height: 30px;
        }
    </style>
</head>
<body>
    <div id="telaNota">
        <h1>Bloco de Notas</h1>
        <p>Título:</p>
        <input type="text" id="titulo" style="width: 500px; height: 30px;" placeholder="Digite o título da nota" required><br><br>

        <p>Conteúdo:</p>
        <textarea id="texto" style="resize: none; width: 500px; height: 200px;" rows="8" placeholder="Digite sua nota aqui" ></textarea><br><br>

        <button class="botao" id="salvar">Salvar Nota</button>
        <button class="botao" id="excluir">Excluir</button>
    </div>
    
    <div id="lista">
        <h2 id="tLS">Notas Salvas</h2>
        <ol id="listaNotas"></ol>
    </div>
    
    <script>
        let bSalvar = document.getElementById("salvar");
        let bExcluir = document.getElementById("excluir");
        let titulo = document.getElementById("titulo");
        let texto = document.getElementById("texto");
        let lista = document.getElementById("listaNotas");
        let textos = JSON.parse(localStorage.getItem("Notas")) || [];
        let nota = {titulo: "", nota: ""};
        let iSelecionado = -1;
        let notaExistente = false;
        
        function listarNotas(){
            lista.innerHTML = "";
            for(let i=0;i<textos.length;i++){
                let li = document.createElement("li");
                li.innerHTML = textos[i].titulo;
                li.style.cursor = "pointer";
                li.addEventListener("click",()=>{
                    iSelecionado = i;
                    titulo.value = textos[i].titulo;
                    texto.value = textos[i].nota;
                    notaExistente = true;
                });
                lista.appendChild(li);
            }
        }
        listarNotas();

        bSalvar.addEventListener("click", ()=>{
            if(titulo.value === "" && texto.value === ""){
                alert("Digite um titulo e/ou conteúdo para salvar a nota");
            }else{
                if(notaExistente){
                    textos[iSelecionado].titulo = titulo.value;
                    textos[iSelecionado].nota = texto.value;
                    localStorage.setItem("Notas", JSON.stringify(textos ));
                    notaExistente = false;

                    document.getElementById("titulo").value = "";
                    document.getElementById("texto").value = "";
                    listarNotas();
                }else{
                    nota = {titulo: titulo.value, nota: texto.value};
                    textos.push(nota);
                    let txtJSON = JSON.stringify(textos);
                    localStorage.setItem("Notas", JSON.stringify(textos));
                    
                    document.getElementById("titulo").value = "";
                    document.getElementById("texto").value = "";
                    listarNotas();
                }
            }
            
        });

        bExcluir.addEventListener("click", ()=>{
            if(titulo.value === "" && texto.value === "" || iSelecionado === -1){
                alert("Selecione uma nota para excluir");
            }else{
                let r = confirm("Deseja realmente excluir esta nota?");
                if(r){
                    textos.splice(iSelecionado,1);
                    localStorage.setItem("Notas",JSON.stringify(textos));
                    listarNotas();
                    titulo.value="";
                    texto.value="";
                    iSelecionado = -1;
                }
            }
        });

    </script>
</body>
</html>
