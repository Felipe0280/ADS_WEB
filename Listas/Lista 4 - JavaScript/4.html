<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numero aleatorio</title>
</head>
<body>
    <h2><b>Numero aleatorio:</b></h2>
    <label for="valormin">Numero minimo: </label>
    <input id= "valormin" type="number" value="0">

    <label for="valormax">Numero maximo: </label>
    <input id= "valormax" type="number" value="100">

    <button id="botao"> Gerar numero aleatorio</button>

    <script>
        let Botao = document.querySelector("#botao");
        let vMin = document.querySelector("#valormin");
        let vMax = document.querySelector("#valormax");
        let objetos = [];
        Botao.addEventListener("click", ()=>{
            let delta = Number(vMax.value) - Number(vMin.value);
            let numero = Math.trunc((Math.random() * delta) + Number(vMin.value));
            let numeroIndice = 0;
            let p= document.createElement("p");
            p.innerHTML = "o numero aleatorio é " + numero;
            document.body.appendChild(p);
            let encontrado = false;
            let pVezes= document.createElement("p");
            for(let i=0;i<objetos.length;i++){
                if(objetos[i].numero == numero){
                    objetos[i].vezes++;
                    encontrado = true;
                    numeroIndice = i;
                    break;
                }
            }

            if(!encontrado){
                objetos.push({
                    numero:numero,
                    vezes:1
                });   
            }else{
                pVezes.innerHTML = "Vezes na qual o numero "+numero+" apareceu é: " + objetos[numeroIndice].vezes;
                document.body.appendChild(pVezes)
            }
        })
        
    </script>
</body>
</html>
