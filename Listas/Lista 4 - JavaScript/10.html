<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="botao">Clique aqui</button><br><br>
    <input type="text" id="textInput" placeholder="Digite algo"><br><br>
    <div id="hoverDiv" style="width:200px; height:100px; border:1px solid black;"> Passe o mouse aqui </div><br>
    <select id="colorSelect">
        <option value="">Escolha uma cor</option>
        <option value="blue">Azul</option>
        <option value="green">Verde</option>
        <option value="red">Vermelho</option>
    </select>

    <script>
        let botao = document.getElementById("botao");
        let texto = document.getElementById("textInput");
        let div = document.getElementById("hoverDiv");
        let select = document.getElementById("colorSelect");

        botao.addEventListener("click", () => {
            alert("Você clicou no botão!");
        });

        texto.addEventListener("keydown", (event) => {
            console.log(event.key);
        });

        texto.addEventListener("focus", () => {
            texto.style.backgroundColor = "yellow";
        });

        texto.addEventListener("blur", () => {
            texto.style.backgroundColor = "";
        });

        div.addEventListener("mouseover", () => {
            div.style.backgroundColor = "lightblue";
        });

        div.addEventListener("mouseout", () => {
            div.style.backgroundColor = "";
        });

        select.addEventListener("change", () => {
            if(select.value == ""){
                document.body.style.backgroundColor = "white";
            }else{
                document.body.style.backgroundColor = select.value;
            }
        });
    </script>
</body>
</html>
