<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Digite seu nome:</p>
    <input type="text" id="nome"><br>
    <p>Digite seu peso:</p>
    <input type="number" id="peso" step="0.1"><br>
    <p>digite sua altura:</p>
    <input type="number" id="altura" step="0.01"><br><br>
    <button id="botao">Calcular</button>

    <p id="resultadoIMC"></p>
    <p id="classificacao"></p>

    <img id="imgPerfil" src="imagens/perfil.jpg">

    <script>
        let Botao = document.querySelector("#botao");
        let nome = document.querySelector("#nome");       

        Botao.addEventListener("click", ()=>{ 
            let peso = Number(document.getElementById("peso").value);
            let altura = Number(document.getElementById("altura").value);

            let calc = peso/(altura*altura);

            resultadoIMC.innerHTML = "Seu IMC é " + calc.toFixed(2);

            if(calc < 18.5){
                classificacao.innerHTML = "Abaixo do peso";
                imgPerfil.src = "imagens/abaixopeso.png";
            }else if(calc >=18.5 && calc <24.9){
                classificacao.innerHTML = "Peso normal";
                imgPerfil.src = "imagens/normal.png";
            }else if(calc >=25 && calc <29.9){
                classificacao.innerHTML = "Sobrepeso";
                imgPerfil.src = "imagens/sobrepeso.png";
            }else if(calc >=30 && calc <34.9){
                classificacao.innerHTML = "Obesidade Grau I";
                imgPerfil.src = "imagens/obesidade1.png";
            }else if(calc >=35 && calc <39.9){
                classificacao.innerHTML = "Obesidade Grau II";
                imgPerfil.src = "imagens/obesidade2.png";
            }else{
                classificacao.innerHTML = "Obesidade Grau III";
                imgPerfil.src = "imagens/obesidade3.png";
            }
        });


    </script>
</body>
</html>
