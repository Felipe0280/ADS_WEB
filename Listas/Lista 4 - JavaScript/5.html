<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numero Primos</title>
</head>
<body>
    <h1>Numeros Primos</h1><br>

    <label for="inicio">Número Inicial:</label>
    <input type="number" id="inicio">

    <label for="fim">Número Final:</label>
    <input type="number" id="fim">

    <button id="btnVerificar">Verificar</button>

    <h2 id="primos"></h2>
    <p id="resultadoPrimos"></p>

    <script>
        let botao = document.querySelector("#btnVerificar");
        botao.addEventListener("click", () => {
            let inicio = parseInt(document.getElementById("inicio").value);
            let fim = parseInt(document.getElementById("fim").value);
            let r = document.getElementById("resultadoPrimos");

            if (isNaN(inicio) || isNaN(fim) || inicio > fim) {
                alert("Inserir TODOS os dados coretamente");
                return;
            }

            let primos = [];

            for (let n = inicio; n <= fim; n++) {
                if (n > 1) {
                    let PrimoVerifica = true;
                    for (let i = 2; i <= Math.sqrt(n); i++) {
                        if (n % i === 0) {
                            PrimoVerifica= false;
                            break;
                        }
                    }
                    if (PrimoVerifica) {
                        primos.push(n);
                    }
                }
            }

            document.getElementById("primos").innerHTML = "Primos Encontrados";
             if (primos.length === 0) {
                r.innerText = "Nenhum número primo encontrado neste intervalo!";
            } else {
                r.innerText = "Números primos encontrados nesse intervalo de tempo: " + primos.join(", ");
            }
        });
    </script>

</body>
</html>
