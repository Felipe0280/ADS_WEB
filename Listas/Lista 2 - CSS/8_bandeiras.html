<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeiras</title>

    <style>
        .bandeira{
            width: 200px;
            height: 150px;
            margin: 10px;
            border: 1px solid black;
        }

        #japao.bandeira{
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circuloj{
            width: 80px;
            height: 80px;
            background-color: red;
            border-radius: 100%;
        }
        
        .pretoa{
            height: 50px;
            background-color: black;
        }

        .vermelhoa{
            height: 50px;
            background-color: red;
        }

        .amareloa{
            height: 50px;
            background-color: gold;
        }

        .vermelhoh{
            height: 50px;
            background-color: red;
        }

        .brancoh{
            height: 50px;
            background-color: white;
        }

        .azulh{
            height: 50px;
            background-color: blue;
        }

        #italia.bandeira{
            display: flex;
        }

        .verdei{
            width: 66.6px;
            height: 150px;
            background-color: green;
        }

        .brancoi{
            width: 66.6px;
            height: 150px;
        }

        .vermelhoi{
            width: 66.6px;
            height: 150px;
            background-color: red;
        }

        #brasil.bandeira{
            background-color: green;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .amarelob{
            width: 100px;
            height: 100px;
            background-color: yellow;
            transform: rotate(45deg);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .azulb{
            width: 55px;
            height: 55px;
            background-color: blue;
            border-radius: 100%;
            transform: rotate(-45deg);
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="bandeira" id="japao">
            <div class="circuloj"></div>
        </div>

        <div class="bandeira" id="alemanha">
            <div class="pretoa"></div>
            <div class="vermelhoa"></div>
            <div class="amareloa"></div>
        </div>

        <div class="bandeira" id="holanda">
            <div class="vermelhoh"></div>
            <div class="brancoh"></div>
            <div class="azulh"></div>
        </div>

        <div class="bandeira" id="italia">
            <div class="verdei"></div>
            <div class="brancoi"></div>
            <div class="vermelhoi"></div>
        </div>

        <div class="bandeira" id="brasil">
            <div class="amarelob">
                <div class="azulb"></div>
            </div>
        </div>

    </div>

</body>
</html>
