<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box{width: 60px;height: 60px;}
    #box1{background-color: blue;}
    #box2{background-color: red;}
    #box3{background-color: purple;}
    #box4{background-color: yellow;}
    #box5{background-color: green;}
    /*
    Propriedades Flex-item: 
    flex-grow: define a porção de uma proporção 
        exemplo: a1{flex-grow: 1}; a2{flex-grow: 9}; a1 = 1/10 e a2 = 9/10 de x
    flex-shrink: ordem na qual se perde espaço na linha ao faltar espaço na linha, sendo o valor '0' a nulidade dessa propriedade
    flex-order: Define a ordem em que os elementos aparecem na linha, sendo o '0' o primeiro valor 
    */


    .container{
        display: flex;
        height: 600px;
        width: 600px;
        border: 1px solid black;
        flex-direction: column-reverse;/*row | row-reverse | column | column-reverse */
        justify-content: space-around;/*start | end | center | space-between | space-around | space-evenly  */
        align-items: end;/*stretch | start | end | center | baseline | first baseline | last baseline */
        /*align-content: start | end | center | space-between | space-around | space-evenly | stretch */
        }
</style>
<body>
    <div class="container" >
        <div class="box" id="box1"> box1</div>
        <div class="box" id="box2"> box2</div>
        <div class="box" id="box3"> box3</div>
        <div class="box" id="box4"> box4</div>
        <div class="box" id="box5"> box5</div>
    </div>
</body>
</html>
